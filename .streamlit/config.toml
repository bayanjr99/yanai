[theme]
# Brand palette aligned with the Yanai Personnel logo (deep green + lime).
primaryColor             = "#16A34A"
backgroundColor          = "#F8FAFC"
secondaryBackgroundColor = "#FFFFFF"
textColor                = "#0F172A"
font                     = "sans serif"

[server]
headless             = true
enableCORS           = false
enableXsrfProtection = true

[browser]
gatherUsageStats = false

[runner]
magicEnabled = false
