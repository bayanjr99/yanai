services:
  - type: web
    name: smart-billing-system
    env: python
    region: frankfurt
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: bash start.sh
    envVars:
      - key: DATA_ROOT
        value: /data
      - key: OUTPUT_ROOT
        value: /data/output
      - key: ANTHROPIC_API_KEY
        sync: false   # set manually in Render dashboard
    disk:
      name: billing-data
      mountPath: /data
      sizeGB: 1
